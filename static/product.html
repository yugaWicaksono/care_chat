<!doctype html>
<html lang="nl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Rolstoeladvies</title>
<style>
  * { box-sizing: border-box; margin: 0; }
  body {
    font-family: system-ui, sans-serif;
    background: #f2f4f7;
    display: flex;
    justify-content: center;
    height: 100vh;
  }
  main {
    display: flex;
    flex-direction: column;
    width: 100%;
    max-width: 640px;
    height: 100%;
    background: #fff;
  }
  header {
    padding: 1rem;
    border-bottom: 1px solid #e3e6ea;
    font-weight: 600;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  header a {
    font-weight: 400;
    font-size: 0.85rem;
    color: #2563eb;
    text-decoration: none;
  }
  #messages {
    flex: 1;
    overflow-y: auto;
    padding: 1rem;
    display: flex;
    flex-direction: column;
    gap: 0.5rem;
  }
  .bubble {
    max-width: 80%;
    padding: 0.6rem 0.9rem;
    border-radius: 1rem;
    line-height: 1.4;
    white-space: pre-wrap;
  }
  .user {
    align-self: flex-end;
    background: #2563eb;
    color: #fff;
    border-bottom-right-radius: 0.25rem;
  }
  .bot {
    align-self: flex-start;
    background: #e9edf2;
    color: #111;
    border-bottom-left-radius: 0.25rem;
  }
  form {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    padding: 1rem;
    border-top: 1px solid #e3e6ea;
  }
  #input {
    flex: 1;
    padding: 0.6rem 0.9rem;
    border: 1px solid #cbd2d9;
    border-radius: 1.2rem;
    font-size: 1rem;
    font-family: inherit;
    line-height: 1.4;
    resize: none;
    max-height: 8rem;
    overflow-y: auto;
  }
  button {
    padding: 0.6rem 1.2rem;
    border: none;
    border-radius: 1.5rem;
    background: #2563eb;
    color: #fff;
    font-size: 1rem;
    cursor: pointer;
  }
  button:disabled { opacity: 0.5; cursor: default; }
</style>
</head>
<body>
<main>
  <header>🦽 Rolstoeladvies <a href="/">Heeft u een defect product?</a></header>
  <div id="messages"></div>
  <form id="form">
    <textarea id="input" placeholder="Bijvoorbeeld: ik zoek een rolstoel, ik weeg ongeveer 90 kg…" autocomplete="off" autofocus></textarea>
    <button id="send" type="submit">Versturen</button>
  </form>
</main>
<script>
  const sessionId = localStorage.productSessionId ||= crypto.randomUUID();
  const messages = document.getElementById("messages");
  const form = document.getElementById("form");
  const input = document.getElementById("input");
  const send = document.getElementById("send");

  function autoResize() {
    input.style.height = "auto";
    input.style.height = input.scrollHeight + "px";
  }
  input.addEventListener("input", autoResize);

  function addBubble(text, who) {
    const div = document.createElement("div");
    div.className = "bubble " + who;
    div.textContent = text;
    messages.appendChild(div);
    messages.scrollTop = messages.scrollHeight;
    return div;
  }

  addBubble("Hallo, ik help u graag de juiste rolstoel te vinden. Wat is ongeveer uw gewicht, en rijdt u zelf of wordt u geduwd?", "bot");

  form.addEventListener("submit", async (e) => {
    e.preventDefault();
    const text = input.value.trim();
    if (!text) return;
    addBubble(text, "user");
    input.value = "";
    autoResize();
    send.disabled = input.disabled = true;
    const typing = addBubble("…", "bot");
    try {
      const res = await fetch("/chat/product", {
        method: "POST",
        headers: { "Content-Type": "application/json", "X-Session-Id": sessionId },
        body: JSON.stringify({ message: text }),
      });
      if (!res.ok) throw new Error("HTTP " + res.status);
      typing.textContent = (await res.json()).reply;
    } catch (err) {
      typing.textContent = "Sorry, er ging iets mis: " + err.message;
    } finally {
      send.disabled = input.disabled = false;
      input.focus();
      messages.scrollTop = messages.scrollHeight;
    }
  });
</script>
</body>
</html>
